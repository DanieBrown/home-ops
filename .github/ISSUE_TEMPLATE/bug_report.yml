name: Bug Report
description: Report a bug in home-ops
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15, Ubuntu 24.04, Windows 11"
  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: Include the command, listing URL, script name, or dashboard action involved.
  - type: markdown
    attributes:
      value: |
        ---
        Attach any relevant logs or tracker excerpts that help reproduce the issue.
